<div class="flex flex-col flex-1 min-w-0 bg-white border border-[#E5E7EB] rounded-2xl overflow-hidden min-h-[738px]">

    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-[#E5E7EB]">
        <div class="flex items-center gap-2">
            <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h3 class="text-sm font-semibold text-[#111827]">Recent Tap Activity</h3>
        </div>
        <button class="flex items-center gap-1 text-xs font-semibold text-primary">
            View all
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
            </svg>
        </button>
    </div>

    <!-- Table -->
    <table class="w-full text-[13px]" *ngIf="entries.length > 0; else emptyState">
        <thead class="bg-[#F9FAFB] border-b border-[#E5E7EB]">
            <tr>
                <th class="text-left px-6 py-3 text-[9px] font-bold text-[#6A7282] tracking-[0.08em] uppercase">
                    Subscriber</th>
                <th class="text-left px-6 py-3 text-[9px] font-bold text-[#6A7282] tracking-[0.08em] uppercase">HMS-ID
                </th>
                <th class="text-left px-6 py-3 text-[9px] font-bold text-[#6A7282] tracking-[0.08em] uppercase">Meal
                    Slot</th>
                <th class="text-left px-6 py-3 text-[9px] font-bold text-[#6A7282] tracking-[0.08em] uppercase">Time
                </th>
                <th class="text-left px-6 py-3 text-[9px] font-bold text-[#6A7282] tracking-[0.08em] uppercase">Status
                </th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let entry of entries; let last = last" [class.border-b]="!last"
                [class.border-[#E5E7EB]]="!last">
                <td class="px-6 py-3 font-semibold text-[#111827]">{{ entry.customer }}</td>
                <td class="px-6 py-3 font-sans font-medium tracking-[-0.15px]" style="color:#4A5565; font-size:13px;">
                    {{ entry.hmsId }}
                </td>
                <td class="px-6 py-3 font-semibold text-[#111827]">{{ entry.mealSlot }}</td>
                <td class="px-6 py-3 text-[#4A5565]">{{ entry.time }}</td>
                <td class="px-6 py-3">
                    <span class="text-xs font-medium px-2.5 py-1 rounded-md" [ngClass]="getStatusClass(entry.status)">
                        {{ entry.status }}
                    </span>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- Empty State -->
    <ng-template #emptyState>
        <div class="flex flex-col items-center justify-center flex-1 min-h-[500px] px-6 text-center">
            <div class="w-16 h-16 mb-4 rounded-full bg-[#F3F4F6] flex items-center justify-center">
                <svg class="w-8 h-8 text-[#9CA3AF]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h4 class="text-[15px] font-semibold text-[#111827] mb-1">No Recent Taps</h4>
            <p class="text-[13px] text-[#6B7280] max-w-xs mx-auto">
                Waiting for the first tap. Activity will appear here automatically when subscribers start using their
                RFID tags.
            </p>
        </div>
    </ng-template>
</div>
