<div class="grid grid-cols-4 gap-4 mb-6">

    <!-- Total Subscribers -->
    <div class="relative min-h-[129px]" [style.background]="'url(assets/total_subs_card.svg) no-repeat'"
        [style.background-size]="'100% 100%'">
        <div class="absolute inset-0 p-5 flex flex-col justify-between">
            <div class="flex items-center gap-[6px]">
                <img src="assets/subscribers_icon.svg" class="w-5 h-5" alt="subscribers" />
                <span class="text-xs text-gray-400 font-normal">Total Subscribers</span>
            </div>
            <p class="text-4xl font-bold text-gray-900">250</p>
        </div>
        <p class="text-4xl font-bold text-gray-900">250</p>
    </div>

    <!-- Active Subscriptions -->
    <div class="relative min-h-[129px]" [style.background]="'url(assets/active_card.svg) no-repeat'"
        [style.background-size]="'100% 100%'">
        <div class="absolute inset-0 p-5 flex flex-col justify-between">
            <div class="flex items-center gap-[6px]">
                <img src="assets/active_subscriptions.svg" class="h-5" alt="active subscriptions" />
            </div>
            <p class="text-4xl font-bold text-gray-900">223</p>
        </div>
        <p class="text-4xl font-bold text-gray-900">223</p>
    </div>

    <!-- Total Meals Served Today -->
    <div class="relative min-h-[129px]" [style.background]="'url(assets/total_meals_card.svg) no-repeat'"
        [style.background-size]="'100% 100%'">
        <div class="absolute inset-0 p-5 flex flex-col justify-between">
            <div class="flex items-center gap-[6px]">
                <img src="assets/total_meals_served.svg" class="h-5" alt="total meals served" />
            </div>
            <p class="text-4xl font-bold text-gray-900">345</p>
        </div>
        <p class="text-4xl font-bold text-gray-900">345</p>
    </div>

    <!-- Absent Today -->
    <div class="relative min-h-[129px]" [style.background]="'url(assets/absent_card.svg) no-repeat'"
        [style.background-size]="'100% 100%'">
        <div class="absolute inset-0 p-5 flex flex-col justify-between">
            <div class="flex items-center gap-[6px]">
                <img src="assets/exclamation.svg" class="w-5 h-5" alt="absent" />
                <span class="text-xs text-gray-400 font-normal">Absent Today</span>
            </div>
            <p class="text-4xl font-bold text-gray-900">50</p>
        </div>
        <p class="text-4xl font-bold text-gray-900">50</p>
    </div>
</div>
