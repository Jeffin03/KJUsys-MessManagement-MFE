<div class="mb-5">
    <!-- Section Header -->
    <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
            <span class="text-sm font-semibold" style="color:#111827;">Meal Slots</span>
            <span class="text-xs" style="color:#747474;">· 3 slots configured for today</span>
        </div>
        <button (click)="openConfigure()" (mouseenter)="hovering=true" (mouseleave)="hovering=false"
            class="text-xs font-semibold px-4 py-2 rounded-lg text-white transition-all duration-200"
            [style.background-color]="hovering ? '#0F4ED8' : '#155DFC'" style="cursor:pointer;">
            Configure Meal Slots
        </button>
    </div>

    <!-- Cards -->
    <div class="grid grid-cols-3 gap-4">
        <div *ngFor="let slot of mealSlots" class="rounded-xl p-5"
            style="background:#FFFFFF; border:1px solid #E5E7EB; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">

            <!-- Card Header -->
            <div class="flex items-center justify-between mb-1">
                <div class="flex items-center gap-2">
                    <img [src]="(slot.name === 'Breakfast' || slot.name === 'Brunch') ? 'assets/Vector.svg' : slot.name === 'Lunch' ? 'assets/Vector (1).svg' : slot.name === 'Snacks' ? 'assets/Cup of Tea.svg' : 'assets/Vector (3).svg'"
                        [alt]="slot.name" class="w-5 h-5" />
                    <h3 class="text-sm font-bold" style="color:#111827;">{{ slot.name }}</h3>
                </div>
                <span class="text-xs font-semibold px-3 py-1 rounded-full" [ngClass]="getStatusClass(slot.status)">
                    <span *ngIf="slot.status === 'Live'" class="inline-block w-1.5 h-1.5 rounded-full mr-1 align-middle"
                        style="background-color:#1D9F00;"></span>
                    {{ slot.status }}
                </span>
            </div>

            <!-- Divider -->
            <div style="border-top: 1px solid #E5E7EB; margin: 12px -20px 8px -20px;"></div>

            <!-- Time -->
            <div class="flex items-center gap-1 px-0 py-0">
                <img src="assets/Time_light.svg" alt="time" class="w-3 h-3" />
                <span class="text-xs" style="color:#747474;">{{ slot.timeRange }}</span>
            </div>

            <!-- Divider -->
            <div style="border-top: 1px solid #E5E7EB; margin: 8px -20px 20px -20px;"></div>

            <!-- Stats -->
            <div class="grid grid-cols-3 gap-2 text-center items-start">
                <!-- Total -->
                <div class="flex flex-col items-center">
                    <div class="flex items-center justify-center h-[42px]">
                        <p class="font-bold text-center"
                            style="color:#155DFC; font-size:36px; line-height:25.19px; letter-spacing:-0.19px; margin:0;">
                            {{ slot.total }}
                        </p>
                    </div>
                    <p class="text-xs mt-2" style="color:#747474;">Total</p>
                </div>

                <!-- Had Meal -->
                <div class="flex flex-col items-center">
                    <div class="flex items-center justify-center h-[42px]">
                        <ng-container *ngIf="slot.hadMeal !== null; else dashHad">
                            <p class="font-bold"
                                style="color:#1D9F00; font-size:36px; line-height:25.19px; letter-spacing:-0.19px; margin:0;">
                                {{ slot.hadMeal }}
                            </p>
                        </ng-container>
                        <ng-template #dashHad>
                            <svg width="12" height="5" viewBox="0 0 12 5" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M11.9404 0V4.321H0V0H11.9404Z" fill="#747474" />
                            </svg>
                        </ng-template>
                    </div>
                    <p class="text-xs mt-2" style="color:#747474;">Had Meal</p>
                </div>

                <!-- Third Stat -->
                <div class="flex flex-col items-center">
                    <div class="flex items-center justify-center h-[42px]">
                        <ng-container *ngIf="slot.thirdStat !== null; else dashThird">
                            <p class="font-bold"
                                [ngClass]="slot.thirdLabel === 'Pending' ? 'text-[#FE9A00]' : 'text-[#D92C2B]'"
                                style="font-size:36px; line-height:25.19px; letter-spacing:-0.19px; margin:0;">
                                {{ slot.thirdStat }}
                            </p>
                        </ng-container>
                        <ng-template #dashThird>
                            <svg width="12" height="5" viewBox="0 0 12 5" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M11.9404 0V4.321H0V0H11.9404Z" fill="#747474" />
                            </svg>
                        </ng-template>
                    </div>
                    <p class="text-xs mt-2" style="color:#747474;">{{ slot.thirdLabel }}</p>
                </div>
            </div>

            <!-- Bottom Divider -->
            <div style="border-top: 1px solid #E5E7EB; margin: 20px -20px 0 -20px;"></div>
            <div style="height:10px;"></div>
        </div>
    </div>

    <!-- Configure Modal -->
    <app-configure-meal-slots [isOpen]="isConfigureOpen" (closed)="closeConfigure()">
    </app-configure-meal-slots>
</div>
