    <!-- Hardware Status Section -->

        <div class="flex items-center gap-2 px-5 pt-5 pb-4 bg-[#F9FAFB] border-b border-[#E5E7EB] rounded-t-2xl">

            <h3 class="text-[#111827] text-[14px] font-semibold tracking-[-0.01em]">Hardware Status</h3>
        </div>

        <div class="flex flex-col px-5 py-4 bg-white gap-3">

            <!-- ESP32 Unit 1 -->
            <div class="flex items-center justify-between py-1">
                <div class="flex items-center gap-2">

                        <path d="M12.5 25V21.25" stroke="#155DFC" stroke-width="2" stroke-linecap="round" />
                        <path d="M17.5 25V21.25" stroke="#155DFC" stroke-width="2" stroke-linecap="round" />
                        <path d="M5 12.5L8.75 12.5" stroke="#155DFC" stroke-width="2" stroke-linecap="round" />

                    </svg>
                    <span class="text-[#111827] text-xs font-normal">ESP32 Unit 1</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-[#1D9F00]"></span>
                    <span class="text-[#1D9F00] text-xs font-normal">Online</span>
                </div>
            </div>

            <!-- ESP32 Unit 2 -->
            <div class="flex items-center justify-between py-1">
                <div class="flex items-center gap-2">
                    <svg width="16" height="16" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path

                            stroke="#155DFC" stroke-width="2" />
                        <rect x="12.5" y="12.5" width="5" height="5" rx="1" fill="#155DFC" />
                        <path d="M12.5 8.75V5" stroke="#155DFC" stroke-width="2" stroke-linecap="round" />
                        <path d="M17.5 8.75V5" stroke="#155DFC" stroke-width="2" stroke-linecap="round" />
                        <path d="M21.25 12.5L25 12.5" stroke="#155DFC" stroke-width="2" stroke-linecap="round" />
                        <path d="M21.25 17.5L25 17.5" stroke="#155DFC" stroke-width="2" stroke-linecap="round" />
                        <path d="M12.5 25V21.25" stroke="#155DFC" stroke-width="2" stroke-linecap="round" />

                        <path d="M5 17.5L8.75 17.5" stroke="#155DFC" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    <span class="text-[#111827] text-xs font-normal">ESP32 Unit 2</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-[#1D9F00]"></span>
                    <span class="text-[#1D9F00] text-xs font-normal">Online</span>
                </div>
            </div>

            <!-- WiFi Router -->
            <div class="flex items-center justify-between py-1">
                <div class="flex items-center gap-2">
                    <svg width="16" height="12" viewBox="0 0 20 15" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M13.2727 10.5338L12.9455 10.2449C11.3187 8.809 8.68127 8.809 7.05454 10.2449L6.72727 10.5338M15.7273 7.64494L15.1545 7.13939C12.3078 4.6265 7.69223 4.6265 4.84545 7.13939L4.27273 7.64494M19 4.75606L18.1 3.96162C13.6265 0.0127944 6.37351 0.0127937 1.9 3.96162L1 4.75606"

                            fill="#155DFC" stroke="#155DFC" stroke-width="0.5" />
                    </svg>
                    <span class="text-[#111827] text-xs font-normal">WiFi Router</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-[#1D9F00]"></span>
                    <span class="text-[#1D9F00] text-xs font-normal">Connected</span>
                </div>
            </div>

            <!-- POS Printer -->
            <div class="flex items-center justify-between py-1">
                <div class="flex items-center gap-2">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M18.3529 14H19C19.9428 14 20.4142 14 20.7071 13.7071C21 13.4142 21 12.9428 21 12V11C21 9.11438 21 8.17157 20.4142 7.58579C19.8284 7 18.8856 7 17 7H7C5.11438 7 4.17157 7 3.58579 7.58579C3 8.17157 3 9.11438 3 11V13C3 13.4714 3 13.7071 3.14645 13.8536C3.29289 14 3.5286 14 4 14H5.64706"

                        <path
                            d="M18 7V5.88C18 4.87191 18 4.36786 17.8038 3.98282C17.6312 3.64413 17.3559 3.36876 17.0172 3.19619C16.6321 3 16.1281 3 15.12 3H8.88C7.87191 3 7.36786 3 6.98282 3.19619C6.64413 3.36876 6.36876 3.64413 6.19619 3.98282C6 4.36786 6 4.87191 6 5.88V7"
                            stroke="#155DFC" stroke-width="2" />
                        <path d="M10 14L13 14" stroke="#155DFC" stroke-width="2" stroke-linecap="round" />
                        <path d="M10 17L14.5 17" stroke="#155DFC" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    <span class="text-[#111827] text-xs font-normal">POS Printer</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-[#FE9A00]"></span>
                    <span class="text-[#FE9A00] text-xs font-normal">Low Paper</span>
                </div>
            </div>

        </div>
    </div>

    <!-- System Uptime -->
    <div class="px-5 pt-4 pb-5 bg-white rounded-b-2xl">
        <h3 class="text-[#111827] text-sm font-semibold tracking-[0.08em] uppercase mb-3">
            System Uptime
        </h3>

        <div class="mb-3">
            <div class="flex justify-between mb-1.5">
                <span class="text-[#4A5565] text-xs">Today's Runtime</span>
                <span class="text-[#1D9F00] text-xs font-bold">{{ formattedUptime }}</span>
            </div>
            <div class="h-1.5 bg-[#E5E7EB] rounded-full overflow-hidden">
                <div class="h-full bg-[#1D9F00] rounded-full transition-[width] duration-1000"
                    [style.width.%]="uptimePercent">
                </div>
            </div>
        </div>

        <div class="flex justify-between py-2.5 border-t border-[#E5E7EB]">
            <span class="text-[#4A5565] text-xs">API Response</span>
            <span class="text-[#155DFC] text-xs font-semibold">48 ms avg</span>
        </div>

        <div class="flex justify-between items-center py-2.5 border-t border-[#E5E7EB]">
            <span class="text-[#4A5565] text-xs">Last Sync</span>
            <div class="flex items-center gap-1">
                <span class="text-[#111827] text-xs font-normal">
                    Just Now
                </span>
                <button type="button"
                    class="flex items-center justify-center p-0 bg-transparent border-0 cursor-pointer w-3.5 h-3.5"
                    aria-label="Refresh Status">
                    <img src="assets/fi-rr-refresh.svg" alt="Refresh" class="w-3.5 h-3.5" />
                </button>
            </div>
        </div>
    </div>

</div>
