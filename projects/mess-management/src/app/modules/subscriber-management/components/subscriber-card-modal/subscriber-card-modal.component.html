<div class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50">
    <div class="w-full max-w-[780px] overflow-hidden rounded-2xl bg-white shadow-2xl">

        <!-- Header -->
        <div class="border-b border-gray-200 px-8 py-5">
            <h2 class="text-sm font-semibold" style="color:#1D1D1F;">Add Subscriber</h2>
            <p class="mt-0.5 text-[10px]" style="color:#86868B;">Add subscriber details, meal plans and card details</p>
        </div>

        <!-- Body -->
        <div class="px-8 py-6">

            <!-- Cards Row -->
            <div class="flex justify-center gap-6 mb-8">
                <app-subscriber-card-preview [hmsId]="hmsId" [subscriberName]="subscriber?.firstName || ''">
                </app-subscriber-card-preview>
            </div>

            <!-- HMS ID Section -->
            <div>
                <p class="text-xs font-semibold mb-3" style="color:#4A5565;">Add Card Details</p>
                <label class="block text-[10px] font-medium mb-1.5" style="color:#1D1D1F;">HMS-ID</label>
                <input type="text" [(ngModel)]="hmsId" (ngModelChange)="onHmsIdChange()" placeholder="e.g. ABH976"
                    maxlength="6" class="w-full h-10 rounded-lg border px-3 text-xs outline-none transition-colors"
                    [style.border-color]="hmsIdError ? '#C70036' : '#E5E7EB'" style="color:#1D1D1F;" />
                <p *ngIf="hmsIdError" class="mt-1 text-[10px]" style="color:#C70036;">
                    {{ hmsIdError }}
                </p>
            </div>

        </div>

        <!-- Footer -->
        <div class="flex items-center justify-between border-t border-gray-200 px-8 py-5">
            <button type="button" (click)="onPrevious()"
                class="rounded-lg border border-gray-200 bg-white px-5 py-2 text-xs font-medium cursor-pointer hover:bg-gray-50"
                style="color:#1D1D1F;">Previous</button>
            <button type="button" (click)="onSave()"
                class="rounded-lg bg-blue-600 px-6 py-2 text-xs font-semibold text-white cursor-pointer hover:bg-blue-700">
                Save Configuration</button>
        </div>

    </div>
</div>
