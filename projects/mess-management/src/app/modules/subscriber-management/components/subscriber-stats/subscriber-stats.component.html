<div class="grid grid-cols-4 gap-4 mb-6">
    <div
        class="bg-white border border-border rounded-xl px-4 pt-[22px] pb-[39px] h-[127px] box-border shadow-[0_1px_2px_rgba(0,0,0,0.05)]">
        <div class="flex items-center gap-2">
            <img src="assets/Total.svg" class="w-4 h-4" alt="total">
            <span class="text-xs font-medium text-text-sub">Total</span>
        </div>
        <div class="text-[36px] font-bold text-text-main leading-none tracking-[-0.19px] mt-[9px]">{{ stats.total }}
        </div>
    </div>

    <div
        class="bg-white border border-border rounded-xl px-4 pt-[22px] pb-[39px] h-[127px] box-border shadow-[0_1px_2px_rgba(0,0,0,0.05)]">
        <div class="flex items-center gap-2">
            <img src="assets/Active.svg" class="w-4 h-4" alt="active">
            <span class="text-xs font-medium text-text-sub">Active</span>
        </div>
        <div class="text-[36px] font-bold text-text-main leading-none tracking-[-0.19px] mt-[9px]">{{ stats.active }}
        </div>
    </div>

    <div
        class="bg-white border border-border rounded-xl px-4 pt-[22px] pb-[39px] h-[127px] box-border shadow-[0_1px_2px_rgba(0,0,0,0.05)]">
        <div class="flex items-center gap-2">
            <img src="assets/Pause.svg" class="w-4 h-4" alt="paused">
            <span class="text-xs font-medium text-text-sub">Paused</span>
        </div>
        <div class="text-[36px] font-bold text-text-main leading-none tracking-[-0.19px] mt-[9px]">{{ stats.paused }}
        </div>
    </div>

    <div
        class="bg-white border border-border rounded-xl px-4 pt-[22px] pb-[39px] h-[127px] box-border shadow-[0_1px_2px_rgba(0,0,0,0.05)]">
        <div class="flex items-center gap-2">
            <img src="assets/Lapsed.svg" class="w-4 h-4" alt="lapsed">
            <span class="text-xs font-medium text-text-sub">Lapsed</span>
        </div>
        <div class="text-[36px] font-bold text-text-main leading-none tracking-[-0.19px] mt-[9px]">{{ stats.lapsed }}
        </div>
    </div>
</div>
