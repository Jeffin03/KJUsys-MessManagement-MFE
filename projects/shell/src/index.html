<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>KJusys</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="assets/emblem.png">
  
  <!-- Preconnect: establish TCP+TLS early to CDN hosts -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Font Awesome: non-blocking (only solid subset — ~150KB vs 700KB for all.min.css) -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
        media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" /></noscript>

  <!-- Google Fonts (Inter + Poppins): non-blocking, combined into one request -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
        media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"></noscript>

  <style>
    #global-loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
    }
    /* CSS fallback spinner — visible immediately while lottie.js loads asynchronously */
    #css-fallback-spinner {
      width: 48px; height: 48px;
      border: 5px solid #e2e8f0;
      border-top-color: #1189b2;
      border-radius: 50%;
      animation: _spin 0.8s linear infinite;
    }
    @keyframes _spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <!-- Loading animation and script  -->

  <div id="global-loader">
    <!-- CSS spinner shown immediately — replaced by lottie animation once its script loads -->
    <div id="css-fallback-spinner"></div>
    <div id="lottie-container" style="width: 120px; height: 120px; display: none;"></div>
  </div>

  <script>
    // Load lottie asynchronously — does NOT block HTML parsing or first paint
    var _lottieScript = document.createElement('script');
    _lottieScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js';
    _lottieScript.onload = function() {
      document.getElementById('css-fallback-spinner').style.display = 'none';
      var container = document.getElementById('lottie-container');
      container.style.display = 'block';
      lottie.loadAnimation({
        container: container,
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: 'assets/Loading.json'
      });
    };
    document.head.appendChild(_lottieScript);
  </script>

<!-- route and script   -->
  <app-root style="display: none;"></app-root>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
    var appRoot = document.querySelector('app-root');
    var globalLoader = document.getElementById('global-loader');

    if (!appRoot || !globalLoader) return;

    function showApp() {
      globalLoader.style.display = 'none';
      appRoot.style.display = 'block';
      observer.disconnect();
      clearTimeout(fallbackTimeout);
    }

    var observer = new MutationObserver(function() {
      // Show as soon as Angular has rendered any meaningful content (login or app)
      if (appRoot.querySelector('*') !== null && appRoot.innerHTML.length > 100) {
        showApp();
      }
    });

    observer.observe(appRoot, { childList: true, subtree: true });

    // Hard fallback: never leave the user on a blank screen beyond 3 seconds
    var fallbackTimeout = setTimeout(showApp, 3000);
  });
  </script>

</body>
</html>
