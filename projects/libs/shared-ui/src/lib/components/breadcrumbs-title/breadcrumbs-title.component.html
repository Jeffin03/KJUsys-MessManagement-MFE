<div class="p-5 flex flex-col gap-2">
  <nav class="flex items-center gap-1 text-[10px] font-medium text-slate-500">
    <ng-container *ngFor="let crumb of breadcrumbs; let last = last">
      <a 
        (click)="handleCrumbClick(crumb)"
        class="transition-all duration-200 select-none"
        [ngClass]="{
          'cursor-pointer hover:text-blue-600': crumb.callback,
          'text-blue-600': last,
          'cursor-default': !crumb.callback && !last
        }">
        {{ crumb.label }}
      </a>
      
      <!-- Separator SVG -->
      <svg *ngIf="!last" class="w-3 h-3 text-slate-300 select-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="m9 18 6-6-6-6"/>
      </svg>
    </ng-container>
  </nav>
  <p class="text-xs font-semibold">{{ title }}</p>
</div>
