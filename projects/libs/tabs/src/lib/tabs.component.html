<div class="relative w-full border-b border-gray-200">
  <!-- Left Arrow Overlay -->
  <div *ngIf="showLeftArrow" 
       class="absolute left-0 top-0 bottom-0 z-10 w-12 flex items-center justify-start bg-gradient-to-r from-white/40 to-transparent pointer-events-none">
    <button (click)="scrollLeft()" 
            class="p-1.5 md:p-2 rounded-full hover:bg-gray-100 text-slate-800 transition-all -ml-5 md:ml-1 shadow-lg bg-white border border-gray-200 pointer-events-auto active:scale-90 z-20">
      <svg class="w-4 h-4 md:w-5 h-5 font-bold" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
      </svg>
    </button>
  </div>

  <!-- Scrollable Container -->
  <div #scrollContainer
       (scroll)="onScroll()"
       class="flex items-end overflow-x-auto scroll-smooth hide-scrollbar">
    <div *ngFor="let tab of tabs" 
         #tabElement
         (click)="selectTab(tab.id)"
         [ngClass]="{
           'bg-[#005faa] text-white': activeTabId === tab.id,
           'bg-transparent text-slate-700 hover:bg-gray-100': activeTabId !== tab.id,
           'w-[220px]': !autoWidth,
           'w-auto': autoWidth
         }"
         class="px-6 py-4 rounded-t-xl flex flex-col gap-1 cursor-pointer flex-shrink-0 mb-[-1px] transition-all duration-300 border-x border-t border-transparent"
         [class.border-gray-200]="activeTabId !== tab.id"
         [class.shadow-inner]="activeTabId === tab.id">
      
      <div class="relative inline-flex items-center w-fit gap-2 self-start">
        <span class="text-xs font-medium tracking-wide" [ngClass]="activeTabId === tab.id ? 'text-white' : 'text-slate-800'">
          {{ tab.label }}
        </span>
        
        <!-- Count Badge -->
        <span *ngIf="tab.count !== undefined" 
              class=" bg-red-600 text-white text-[8px] font-bold px-1 py-0.5 rounded-full min-w-[14px] h-[14px] flex items-center justify-center border border-white shadow-sm">
          {{ tab.count }}
        </span>
      </div>
      
      <span class="text-[9px] font-normal leading-none" 
            [ngClass]="activeTabId === tab.id ? 'text-blue-100/80' : 'text-slate-400'">
        {{ tab.subtitle }}
      </span>
    </div>
  </div>

  <!-- Right Arrow Overlay -->
  <div *ngIf="showRightArrow" 
       class="absolute right-0 top-0 bottom-0 z-10 w-12 flex items-center justify-end bg-gradient-to-l from-white/40 to-transparent pointer-events-none">
    <button (click)="scrollRight()" 
            class="p-1.5 md:p-2 rounded-full hover:bg-gray-100 text-slate-800 transition-all -mr-5 md:mr-1 shadow-lg bg-white border border-gray-200 pointer-events-auto active:scale-90 z-20">
      <svg class="w-4 h-4 md:w-5 h-5 font-bold" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="m9 18 6-6-6-6"/>
      </svg>
    </button>
  </div>
</div>
