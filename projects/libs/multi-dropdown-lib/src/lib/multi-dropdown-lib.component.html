<div class="w-full">
  <!-- Dropdown and Clear Button Container -->
  <div class="flex items-center gap-2 w-full">
    <!-- Dropdown Container -->
    <div class="relative w-full">
      <!-- Dropdown Header -->
      <div [ngClass]="customClass"
        class="relative flex items-center justify-between px-4 py-1 cursor-pointer bg-white hover:shadow-md transition w-full text-xs rounded-lg"
        (click)="toggleDropdown()">

        <div class="flex items-center gap-1 flex-wrap w-full">
          <!-- Show selected items (only first 2) -->
          <ng-container *ngFor="let item of selectedItems.slice(0, itemsSelectedShowLimit)">
            <div class="flex items-center bg-blue-50 px-2 py-1 ml-0 rounded-full text-[9px]">
              <span class="text-blue-800 text-xs">{{ (item[textField] + '') | slice:0:5 }}</span>
              <button (click)="removeItem(item, $event)"
                class="ml-2 text-red-500 focus:outline-none">
                ✖
              </button>
            </div>
          </ng-container>

          <!-- Show "+X more" if more than 2 selected -->
          <span *ngIf="selectedItems.length > itemsSelectedShowLimit" class="text-blue-800 text-xs ml-0">
            +{{ selectedItems.length - itemsSelectedShowLimit }} more
          </span>

          <!-- Placeholder if no items are selected -->
          <span *ngIf="selectedItems.length === 0" class="text-gray-500 text-xs">
            {{ searchPlaceholderText }} <span *ngIf="isRequired" style="color: red;" class="text-lg ml-1 relative -mt-2 pr-2 pb-4 pt-1">*</span>
          </span>
        </div>

        <!-- Dropdown Arrow -->
        
        <!-- Up arrow (when open) -->
<svg
  *ngIf="isDropdownOpen"
  (click)="toggleDropdown($event)"
  class="w-4 h-4 text-gray-600 shrink-0 ml-2 cursor-pointer z-10"
  xmlns="http://www.w3.org/2000/svg"
  fill="none"
  viewBox="0 0 24 24"
>
  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m16 14-4-4-4 4" />
</svg>

<!-- Down arrow (when closed) -->
<svg
  *ngIf="!isDropdownOpen"
  (click)="toggleDropdown($event)"
  class="w-4 h-4 text-gray-600 shrink-0 ml-2 cursor-pointer z-10"
  xmlns="http://www.w3.org/2000/svg"
  fill="none"
  viewBox="0 0 24 24"
>
  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m8 10 4 4 4-4" />
</svg>

        
     


      </div>

      <!-- Dropdown List -->
      <div *ngIf="isDropdownOpen"
        class="absolute mt-1 w-full bg-white border border-gray-300 rounded-lg shadow-lg z-50">
      

        <!-- Search Box -->
        <div *ngIf="allowSearchFilter" class="p-2 border-b border-gray-200 sticky top-0 bg-white z-10">
          <input type="text" [(ngModel)]="searchText" placeholder="Search..."
            class="w-full px-3 py-2 text-xs border-gray-400 rounded-xl" />
        </div>

        <div class="w-full flex justify-between ">
          <button *ngIf="showClearButton" class="text-[10px] sm:text-xs text-gray-500 hover:text-gray-800 p-2 ml-2"
            (click)="clearSelection()">
            Reset
          </button>
        
          <button *ngIf="enableCheckAll" class="text-[10px] sm:text-xs p-2 mr-2" (click)="toggleSelectAll()">
            <span class="text-xs" [style.color]="isAllSelected() ?'red':'blue' ">{{ isAllSelected() ? unSelectAllText :
              selectAllText }}</span>
          </button>
        
        </div>
        <hr/>

        <!-- Select All Option -->
        <!-- <div *ngIf="enableCheckAll"
          class="flex items-center px-4 py-2 hover:bg-gray-100 cursor-pointer text-sm sticky top-10 bg-white z-10 border-b border-gray-200"
          (click)="toggleSelectAll()">
          <input type="checkbox" class="mr-2" [checked]="isAllSelected()" />
          <span class="text-xs" [style.color]="isAllSelected() ?'red':'blue' ">{{ isAllSelected() ? unSelectAllText : selectAllText }}</span>
        </div> -->

        <!-- Dropdown Items (Scrollable) -->
        <div class="overflow-y-auto" [ngStyle]="{ 'max-height.px': maxHeight }">
          <div *ngFor="let item of filteredItems()"
            class="flex items-center px-4 py-2 hover:bg-gray-100 cursor-pointer text-xs"
            (click)="toggleSelection(item)">
            <input type="checkbox" [disabled]="maxSelectionLimit !== null && selectedItems.length >= maxSelectionLimit" class="mr-2" [checked]="isSelected(item)" />
            <span class="text-[11px]">{{ item[textField] }}</span>
          </div>
        </div>

        <!-- No Data Placeholder -->
        <div *ngIf="filteredItems().length === 0 && !(hideListByDefault && !searchText)"
          class="px-4 py-2 text-xs text-gray-500">
          {{ noDataAvailablePlaceholderText }}
        </div>

        <!-- Selection Limit Reached Message -->
        <div *ngIf="maxSelectionLimit !== null && selectedItems.length >= maxSelectionLimit"
          class="px-4 py-2 text-xs text-gray-500">
          Maximum {{ maxSelectionLimit }} selections allowed.
        </div>
      </div>

    </div>

    <!-- Asterisk for required field (Placed before the Clear button & slightly higher) -->
    <!-- <span *ngIf="isRequired" style="color: red;" class="text-lg ml-1 relative -mt-2 pr-2 pb-4 pt-1">*</span> -->



  </div>
</div>
